# Hyprlock 锁屏配置

general {
    hide_cursor = true
    immediate_render = true
    no_fade_in = false
    fail_timeout = 2500
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    noise = 0.03
    contrast = 0.95
    brightness = 1.02
}

image {
    monitor =
    size = 128
    rounding = -1
    border_size = 3
    border_color = rgba(143, 188, 187, 0.8)
    position = 0, -180
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 5
    shadow_color = rgba(0, 0, 0, 0.15)
}

label {
    monitor =
    text = <span font_weight="bold">你好，$USER</span>
    color = rgba(236, 239, 244, 0.9)
    font_size = 24
    font_family = "LXGW WenKai Screen"
    position = 0, -120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "<span font_weight='bold'>$(date +"%H:%M")</span>"
    color = rgba(216, 222, 233, 0.95)
    font_size = 64
    font_family = "JetBrains Mono Nerd Font"
    position = 0, 0
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "<span>$(LC_TIME=zh_CN.UTF-8 date +"%Y年%m月%d日 %A")</span>"
    color = rgba(180, 196, 211, 0.9)
    font_size = 18
    font_family = "LXGW WenKai Screen"
    position = 0, 70
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 360, 56
    outline_thickness = 0
    dots_size = 0.3
    dots_spacing = 0.15
    rounding = 28
    inner_color = rgba(76, 86, 106, 0.6)
    font_color = rgb(228, 229, 232)
    font_family = "JetBrains Mono Nerd Font"
    placeholder_text = <i><span foreground="##a6b0c0">请输入密码...</span></i>
    hide_input = false
    check_color = rgba(163, 190, 140, 1.0)
    fail_color = rgba(191, 97, 106, 1.0)
    fail_text = <i><span foreground="##BF616A">$FAIL (尝试 $ATTEMPTS 次)</span></i>
    position = 0, 150
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:10000] echo "<span>$(uname -n) · 运行 $(uptime -p | sed -e 's/up //' -e 's/days/天/' -e 's/hours/小时/' -e 's/minutes/分钟/')</span>"
    color = rgba(158, 173, 191, 0.8)
    font_size = 12
    font_family = "LXGW WenKai Screen"
    position = 20, -20
    halign = left
    valign = bottom
}

label {
    monitor =
    text = <span>$LAYOUT[EN,中文]</span>
    color = rgba(166, 218, 214, 0.9)
    font_size = 14
    font_family = "LXGW WenKai Screen"
    position = -20, -20
    halign = right
    valign = bottom
}
